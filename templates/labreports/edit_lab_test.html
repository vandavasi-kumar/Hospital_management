{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow p-4">
        <h4 class="mb-3 text-center">Edit Lab Test</h4>

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <div class="text-center">
                <button type="submit" class="btn btn-success">
                    Update
                </button>
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                    Cancel
                </a>
            </div>
        </form>
    </div>

</div>

{% endblock %}
