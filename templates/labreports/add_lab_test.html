{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="p-4  text-black text-center">
        <h2>Add Lab Test</h2>
    </div>

    <div class="card shadow mt-4 p-4">

        <form method="POST">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-success">
                Save
            </button>

        </form>

    </div>

</div>

{% endblock %}
