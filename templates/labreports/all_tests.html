{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="p-4 text-black text-center">
        <h2>List of All Lab Tests</h2>
    </div>

    <table class="table table-bordered table-striped text-center">
 <thead class="table-dark">
        <tr>
            <th>Test Name</th>
            <th>Price</th>
            <th>Time</th>
        </tr>
    </thead>

        {% for test in tests %}
        <tr>
            <td>{{ test.lab_test }}</td>
            <td>₹{{ test.test_cost }}</td>
            <td>{{ test.test_duration }}</td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
