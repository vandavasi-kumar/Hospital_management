{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

  <div class="p-4 text-center">
    <h2>🏥 Patient Discharge Form</h2>
  </div>

  <div class="card shadow p-4">

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        {{ form.as_p }}
      </div>

      <div class="text-center mt-3">
        <button type="submit" class="btn btn-success px-4">
          💾 Submit
        </button>
      </div>

    </form>

  </div>

</div>

{% endblock %}
