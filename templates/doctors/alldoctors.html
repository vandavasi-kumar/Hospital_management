{% include 'base.html' %}
{% load static %}

{% block content %}

<div class="container mt-4">
    <h4 class="fw-bold text-center mb-4">All Doctors</h4>
    <div class="row g-4">

        {% for doctor in doctors %}
        <div class="col-md-6">
            <div class="card shadow-sm h-100 border-0 rounded-4">
                <div class="card-body">
                    <div class="d-flex align-items-center justify-content-between">

                        <!-- LEFT CONTENT -->
                        <div>
                            <h5 class="fw-bold mb-1">{{ doctor.name }}</h5>
                            <p class="text-muted mb-1">Age: {{ doctor.age }}</p>
                            <span class="badge bg-primary">
                                {{ doctor.specialized }}
                            </span>
                        </div>

                        <!-- IMAGE -->
                        <div>
                            {% if doctor.profile_pic %}
                            <img src="{{ doctor.profile_pic.url }}" class="rounded-circle border" width="80" height="80"
                                style="object-fit: cover;">
                            {% else %}
                            <img src="{% static 'images/user.png' %}" class="rounded-circle border" width="80"
                                height="80"  style="object-fit: cover;">
                            {% endif %}
                        </div>

                    </div>
                </div>
            </div>
        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
